  <!-- Форма зворотного зв'язку -->
  <h2>Зворотний зв'язок</h2>

  <form action="https://tests.fomenko.top/echo/index.php" method="GET">

    <div>
      <label for="name">Ім'я</label>
      <div>
        <input type="text" id="name" name="name" placeholder="Ваше ім'я" required>
      </div>
    </div>

    <div>
      <label for="phone">Телефон</label>
      <div>
        <input type="tel" id="phone" name="phone" placeholder="+380..." required>
      </div>
    </div>

    <div>
      <label for="email">Email</label>
      <div>
        <input type="email" id="email" name="email" placeholder="example@mail.com" required>
      </div>
    </div>

    <div>
      <label for="question">Ваше питання</label>
      <div>
        <textarea id="question" name="question" rows="5" cols="40" placeholder="Напишіть ваше питання..."
          required></textarea>
      </div>
    </div>

    <div>
      <button type="submit">Відправити</button>
      <button type="reset">Очистити</button>
    </div>

  </form>
