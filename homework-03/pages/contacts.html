  <h1 class="page-title">Контакти</h1>

  <!-- ===== CONTENT ===== -->
  <main class="container">
    <div class="articles-card contact-card">

      <!-- інформація + форма -->
      <section class="contact-info">
        <h2>Звʼяжіться з нами</h2>

        <p><strong>Адреса:</strong><br>
          вулиця Кирпичова&nbsp;2, Харків, 61000</p>

        <p><strong>Телефон:</strong><br>
          <a href="tel:+3800577076634">+38&nbsp;(057)&nbsp;707-66-34</a>
        </p>

        <form class="contact-form" action="https://tests.fomenko.top/echo/index.php" method="GET">
          <div class="form-row">
            <label for="name">Імʼя</label>
            <input id="name" name="name" type="text" placeholder="Ваше ім'я" required>
          </div>

          <div class="form-row">
            <label for="phone">Телефон</label>
            <input id="phone" name="phone" type="tel" placeholder="+380…" required>
          </div>

          <div class="form-row">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" placeholder="example@mail.com" required>
          </div>

          <div class="form-row">
            <label for="question">Ваше питання</label>
            <textarea id="question" name="question" rows="5" placeholder="Напишіть ваше питання…" required></textarea>
          </div>

          <!-- кнопки по центру -->
          <div class="contact-buttons">
            <button class="btn btn--outline" type="submit">Відправити</button>
            <button class="btn btn--reset" type="reset">Очистити</button>
          </div>
        </form>
      </section>

      <!-- Google Maps -->
      <div class="contact-map" aria-hidden="true">
        <iframe title="Мапа розташування"
          src="https://maps.google.com/maps?q=вулиця%20Кирпичова%202%20Харків&t=&z=15&ie=UTF8&iwloc=&output=embed"
          allowfullscreen loading="lazy"></iframe>
      </div>

    </div>
  </main>
